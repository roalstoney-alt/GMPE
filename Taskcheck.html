<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Investor Panel (Secure)</title>

<script src="https://cdn.jsdelivr.net/npm/ethers@6.10.0/dist/ethers.umd.min.js"></script>

<style>
body {background:#0f172a;color:white;font-family:Arial;}
.container {max-width:800px;margin:auto;padding:20px;}
.card {border:1px solid #334155;padding:15px;margin-top:15px;border-radius:10px;}
button {padding:10px;margin-top:10px;background:#00ffae;border:none;border-radius:8px;}
input {width:100%;padding:10px;margin-top:10px;border-radius:8px;border:none;}
.valid {color:#00ffae;}
.invalid {color:red;}
</style>
</head>

<body>

<div class="container">

<h2>💰 Investor Panel (Observer Verified)</h2>

<div id="wallet"></div>
<div id="balance"></div>

<hr>

<h3>Load Reviewed Task</h3>
<input id="cidInput" placeholder="Paste review.json URL">
<button onclick="loadReview()">Load & Verify</button>

<div id="result"></div>

</div>

<script>

// ===== CONFIG =====
const CONTRACT = "0x6881Ad624D23bDC3e21b3B6dafD49C3E7f61BB4C";
const OWNER = "0xbf4c5Cd7eE0af3E1eeAf15c1542e1f3046a6C839";

const ABI = [
  "function withdraw(address payable to,uint256 amount)",
  "function getBalance() view returns(uint256)"
];

let provider = new ethers.BrowserProvider(window.ethereum);
let signer, user, reviewData;

/* ===== INIT ===== */
async function init(){
  await provider.send("eth_requestAccounts", []);
  signer = await provider.getSigner();
  user = await signer.getAddress();

  document.getElementById("wallet").innerText = "Wallet: " + user;

  loadBalance();
}

/* ===== LOAD BALANCE ===== */
async function loadBalance(){
  const c = new ethers.Contract(CONTRACT, ABI, provider);
  const b = await c.getBalance();

  document.getElementById("balance").innerText =
    "Contract Balance: " + ethers.formatEther(b) + " POL";
}

/* ===== LOAD REVIEW.JSON ===== */
async function loadReview(){

  const url = document.getElementById("cidInput").value;
  if(!url) return alert("Paste review.json URL");

  try{

    const res = await fetch(url);
    const data = await res.json();

    reviewData = data;

    // ===== 1. VERIFY WORKER =====
    const workerMsg = JSON.stringify({
      taskId: data.taskId,
      worker: data.worker,
      proofFile: data.proofFile,
      timestamp: data.timestamp
    });

    const workerRecovered = ethers.verifyMessage(workerMsg, data.signature);

    const workerValid =
      workerRecovered.toLowerCase() === data.worker.toLowerCase();

    // ===== 2. VERIFY OBSERVER =====
    const observerMsg = JSON.stringify({
      ...data,
      observerSig: undefined // exclude sig itself
    });

    const observerRecovered = ethers.verifyMessage(observerMsg, data.observerSig);

    const observerValid =
      observerRecovered.toLowerCase() === data.observer.toLowerCase();

    // ===== RESULT =====
    let statusHTML = `
      Worker: ${workerValid ? "✅ valid" : "❌ invalid"}<br>
      Observer: ${observerValid ? "✅ valid" : "❌ invalid"}
    `;

    const canPay = workerValid && observerValid;

    document.getElementById("result").innerHTML = `
      <div class="card">
        <b>Task:</b> ${data.taskId}<br>
        <b>Worker:</b> ${data.worker}<br>
        <b>Observer:</b> ${data.observer}<br>

        ${statusHTML}

        <h4>Proof:</h4>
        ${renderProof(data.proofFile)}

        ${canPay ? `<button onclick="pay()">Approve & Pay</button>` : "<br>❌ Not eligible for payment"}
      </div>
    `;

  }catch(e){
    console.error(e);
    alert("Failed to load review");
  }
}

/* ===== PAY ===== */
async function pay(){

  if(user.toLowerCase() !== OWNER.toLowerCase()){
    alert("Only owner can pay");
    return;
  }

  try{

    const c = new ethers.Contract(CONTRACT, ABI, signer);

    let amount;

    if(reviewData.taskId == 1) amount = "0.01";
    if(reviewData.taskId == 2) amount = "0.02";
    if(reviewData.taskId == 3) amount = "0.03";

    const value = ethers.parseEther(amount);

    document.getElementById("result").innerHTML += "<br>⏳ Paying...";

    const tx = await c.withdraw(reviewData.worker, value);
    await tx.wait();

    document.getElementById("result").innerHTML += "<br>✅ Payment sent";

  }catch(e){
    console.error(e);
    alert(e.reason || e.message);
  }
}

/* ===== RENDER ===== */
function renderProof(url){

  if(url.endsWith(".mp4")){
    return `<video controls width="100%">
              <source src="${url}">
            </video>`;
  }

  if(url.match(/\.(jpg|png|jpeg|gif)$/)){
    return `<img src="${url}" width="100%">`;
  }

  return `<a href="${url}" target="_blank">Open File</a>`;
}

init();

</script>

</body>
</html>
