<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Task Payment</title>

<style>
body {
  background:#0b0f14;
  color:white;
  font-family:Arial;
}

.container {
  max-width:700px;
  margin:auto;
  padding:20px;
}

.card {
  background:#141a22;
  padding:20px;
  border-radius:12px;
  margin-top:20px;
}

button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#00ffae;
  font-weight:bold;
  cursor:pointer;
}

button:disabled {
  background:#555;
}

input {
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:none;
}
</style>
</head>

<body>

<div class="container">

<h2>🧾 Task Payment</h2>

<div class="card">
<button id="connectBtn">🔗 Connect Wallet</button>
<div id="wallet"></div>
</div>

<div class="card">
<h3>🔍 Load Task by CID</h3>

<input id="cid" placeholder="Enter IPFS CID or full gateway URL">
<button id="loadBtn">Load Task</button>

<div id="taskInfo"></div>
</div>

<div class="card">
<h3>💸 Payment (POL)</h3>

<div style="margin-bottom:10px;">
  <strong>Amount (POL)</strong>
  <input id="payAmount" type="number" step="0.0001" placeholder="Enter POL amount (e.g. 10)">
</div>

<button id="payBtn" disabled>🚀 Pay with POL</button>
<div id="status"></div>
</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>

<script>

// ===== 等待 MetaMask =====
async function waitForEthereum() {
  return new Promise(resolve => {
    if (window.ethereum) return resolve(window.ethereum);
    window.addEventListener("ethereum#initialized", () => resolve(window.ethereum), { once: true });
    setTimeout(() => resolve(window.ethereum), 3000);
  });
}

let provider, signer, user, currentTask;
let isProcessing = false;

// ===== CONNECT WALLET =====
async function connectWallet(){
  if (typeof ethers === 'undefined') {
    alert("ethers.js 加载失败\n请强制刷新页面 (Ctrl + Shift + R)");
    return;
  }

  try {
    const ethereum = await waitForEthereum();
    if (!ethereum) return alert("MetaMask not detected");

    const accounts = await ethereum.request({ method: "eth_requestAccounts" });
    user = accounts[0];

    provider = new ethers.providers.Web3Provider(ethereum);
    signer = provider.getSigner();

    document.getElementById("wallet").innerText = "Connected: " + user;
  } catch(e){
    console.error("CONNECT ERROR:", e);
    alert("Wallet connection failed:\n" + e.message);
  }
}

// ===== NETWORK =====
async function checkNetwork(){
  const chainId = await window.ethereum.request({ method: "eth_chainId" });
  if (chainId !== "0x89") {
    await window.ethereum.request({
      method: "wallet_switchEthereumChain",
      params: [{ chainId: "0x89" }]
    });
  }
}

// ===== 智能 CID =====
function extractCID(input) {
  input = input.trim();
  if (input.includes('/ipfs/')) {
    const parts = input.split('/ipfs/');
    return parts[parts.length - 1].split('/')[0].split('?')[0];
  }
  return input;
}

// ===== LOAD TASK =====
async function loadTask(){
  let input = document.getElementById("cid").value.trim();
  if (!input) return alert("Please enter CID or URL");

  const cid = extractCID(input);

  try {
    const url = `https://ipfs.io/ipfs/${cid}`;
    document.getElementById("taskInfo").innerHTML = `<i>Loading from IPFS...</i>`;

    const res = await fetch(url);
    if (!res.ok) throw new Error("IPFS fetch failed");

    const data = await res.json();
    currentTask = data;

    const rewardText = (data.reward !== undefined && data.reward !== null) ? `${data.reward} POL` : "Not specified";

    document.getElementById("taskInfo").innerHTML = `
      <b>${data.title || 'Untitled Task'}</b><br>
      Worker: ${data.worker}<br>
      Reward: ${rewardText}
    `;

    if (data.reward !== undefined && data.reward !== null) {
      document.getElementById("payAmount").value = data.reward;
    }
    document.getElementById("payBtn").disabled = false;

  } catch(e){
    document.getElementById("taskInfo").innerHTML = `<span style="color:#ff6666;">❌ Failed to load task.</span>`;
  }
}

// ===== PAY WITH POL（已加强错误处理 + 显示支付钱包）=====
async function pay(){
  if (isProcessing) return;
  isProcessing = true;

  const btn = document.getElementById("payBtn");
  const statusEl = document.getElementById("status");
  const amountStr = document.getElementById("payAmount").value.trim();

  try {
    // 防御检查
    if (!signer || !provider || !user) {
      throw new Error("Wallet not fully connected. Please reconnect wallet first.");
    }
    if (!currentTask) {
      throw new Error("Please load task first");
    }
    if (!amountStr || parseFloat(amountStr) <= 0) {
      throw new Error("Please enter a valid POL amount");
    }

    btn.disabled = true;
    statusEl.innerHTML = `Checking POL balance...<br><small>Paying from: ${user.slice(0,6)}...${user.slice(-4)}</small>`;

    await checkNetwork();

    const parsedAmount = ethers.utils.parseEther(amountStr);

    // 检查余额
    statusEl.innerHTML = `Checking POL balance...<br><small>Paying from: ${user.slice(0,6)}...${user.slice(-4)}</small>`;
    const balance = await provider.getBalance(user);

    if (balance.lt(parsedAmount)) {
      throw new Error("Insufficient POL balance");
    }

    statusEl.innerText = `Confirm in MetaMask...\nPaying from: ${user.slice(0,6)}...${user.slice(-4)}`;

    const tx = await signer.sendTransaction({
      to: currentTask.worker,
      value: parsedAmount
    });

    statusEl.innerText = "TX: " + tx.hash;
    await tx.wait();

    statusEl.innerHTML = `✅ Payment successful!<br>TX: <a href="https://polygonscan.com/tx/${tx.hash}" target="_blank" style="color:#00ffae">${tx.hash.slice(0,12)}...</a>`;

  } catch(e){
    console.error("PAY ERROR:", e);
    statusEl.innerHTML = `❌ ${e.message || e}<br><small>Paying from: ${user ? user.slice(0,6)+"..." : "unknown"}</small>`;
  } finally {
    isProcessing = false;
    btn.disabled = false;
  }
}

// ===== 初始化 =====
document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("connectBtn").addEventListener("click", connectWallet);
  document.getElementById("loadBtn").addEventListener("click", loadTask);
  document.getElementById("payBtn").addEventListener("click", pay);
});

</script>

</body>
</html>
