<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Task Payment</title>

<!-- ✅ 必须放最上面 -->
<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>

<style>
body {
  background:#0b0f14;
  color:white;
  font-family:Arial;
}

.container {
  max-width:700px;
  margin:auto;
  padding:20px;
}

.card {
  background:#141a22;
  padding:20px;
  border-radius:12px;
  margin-top:20px;
}

button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#00ffae;
  font-weight:bold;
  cursor:pointer;
}

input {
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:none;
}
</style>
</head>

<body>

<div class="container">

<h2>🧾 Task Payment</h2>

<div class="card">
<button id="connectBtn">🔗 Connect Wallet</button>
<div id="wallet"></div>
</div>

<div class="card">
<h3>🔍 Load Task by CID</h3>

<input id="cid" placeholder="Enter IPFS CID">
<button id="loadBtn">Load Task</button>

<div id="taskInfo"></div>
</div>

<div class="card">
<h3>💸 Payment</h3>

<button id="payBtn" disabled>Approve & Pay</button>
<div id="status"></div>
</div>

</div>

<script>

// ===== 等待环境准备 =====
async function waitReady() {
  return new Promise(resolve => {
    const check = () => {
      if (window.ethereum && window.ethers) {
        resolve();
      } else {
        setTimeout(check, 200);
      }
    };
    check();
  });
}

// ===== 全局变量 =====
let provider, signer, user, currentTask;

const USDT = "0xC2132D05D31c914a87C6611C10748AaCBdA6C623";

const ERC20 = [
  "function transfer(address to, uint256 amount) returns (bool)"
];

// ===== 主入口 =====
window.addEventListener("DOMContentLoaded", async () => {

  await waitReady();

  console.log("✅ ethers + ethereum ready");

  // 绑定按钮
  document.getElementById("connectBtn").addEventListener("click", connectWallet);
  document.getElementById("loadBtn").addEventListener("click", loadTask);
  document.getElementById("payBtn").addEventListener("click", pay);

});

// ===== CONNECT（最终稳定版）=====
async function connectWallet(){

  try {

    if(!window.ethereum){
      alert("MetaMask not found");
      return;
    }

    const accounts = await window.ethereum.request({
      method: "eth_requestAccounts"
    });

    user = accounts[0];

    provider = new ethers.providers.Web3Provider(window.ethereum);
    signer = provider.getSigner();

    document.getElementById("wallet").innerText =
      "Connected: " + user;

  } catch(e){

    console.error("CONNECT ERROR:", e);

    alert("Wallet failed: " + e.message);
  }
}

// ===== LOAD CID =====
async function loadTask(){

  const cid = document.getElementById("cid").value;

  if(!cid){
    alert("Enter CID");
    return;
  }

  try {

    const url = `https://ipfs.io/ipfs/${cid}`;

    document.getElementById("taskInfo").innerText = "Loading...";

    const res = await fetch(url);
    const data = await res.json();

    currentTask = data;

    document.getElementById("taskInfo").innerHTML = `
      <b>${data.title}</b><br>
      Worker: ${data.worker}<br>
      Reward: ${data.reward} USDT
    `;

    document.getElementById("payBtn").disabled = false;

  } catch(e){
    alert("CID load failed");
  }
}

// ===== PAY =====
async function pay(){

  if(!currentTask){
    alert("Load task first");
    return;
  }

  try {

    const token = new ethers.Contract(USDT, ERC20, signer);

    let amount = ethers.utils.parseUnits(
      String(currentTask.reward), 6
    );

    document.getElementById("status").innerText =
      "Confirm in wallet...";

    let tx = await token.transfer(
      currentTask.worker,
      amount
    );

    document.getElementById("status").innerText =
      "TX: " + tx.hash;

    await tx.wait();

    document.getElementById("status").innerText =
      "✅ Payment done";

  } catch(e){

    document.getElementById("status").innerText =
      "❌ " + e.message;
  }
}

</script>

</body>
</html>
