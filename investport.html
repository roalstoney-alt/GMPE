<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Investor Portal</title>

<!-- ✅ 使用稳定版 ethers v5 -->
<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>

<style>
body {
  margin:0;
  background:#0b0f14;
  color:white;
  font-family:Arial;
}

.container {
  max-width:700px;
  margin:auto;
  padding:20px;
}

.card {
  background:#141a22;
  padding:20px;
  border-radius:12px;
  margin-top:20px;
}

button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#00ffae;
  font-weight:bold;
  cursor:pointer;
}

button:disabled {
  background:#555;
  cursor:not-allowed;
}

input {
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
}

.status {
  margin-top:10px;
  font-size:14px;
  color:#aaa;
}

.warning {
  color:#ff7675;
  font-size:13px;
}
</style>
</head>

<body>

<div class="container">

<h2>🌍 Investor Portal</h2>

<div class="card">
<button onclick="connectWallet()">🔗 Connect Wallet</button>
<div id="wallet"></div>
</div>

<div class="card">
<h3>💰 Invest (USDT - Polygon)</h3>

<input id="amount" placeholder="Enter amount (e.g. 10)">

<button id="investBtn" onclick="invest()">🚀 Invest Now</button>

<div class="status" id="status"></div>

<div class="warning">
⚠️ Only official USDT (Polygon) is accepted.<br>
Funds go directly to secure multisig Safe.
</div>

<p style="font-size:12px; color:#888;">
Safe Wallet: 0xC8DF...D4E2
</p>

</div>

<div class="card">
<h3>📊 Investment History</h3>
<div id="history">No records yet</div>
</div>

<div class="card">
<h3>🔐 Escrow Info</h3>
<p>Funds are stored in a multisig Safe.</p>
<p>No single party can move funds.</p>
</div>

</div>

<script>

// ===== 配置 =====
const SAFE = "0xC8DF3B516616800b2709F66e1bee7520aBAbD4E2";

// ✅ 正确 Polygon USDT
const USDT = "0xC2132D05D31c914a87C6611C10748AaCBdA6C623";

// ERC20 ABI
const ERC20 = [
  "function transfer(address to, uint256 amount) returns (bool)",
  "function balanceOf(address account) view returns (uint256)"
];

// ===== 状态 =====
let provider, signer, user;
let isProcessing = false;

// ===== 页面加载检测 =====
window.addEventListener("load", () => {
  console.log("DApp loaded");
  console.log("Ethereum object:", window.ethereum);
});

// ===== 连接钱包 =====
async function connectWallet(){

  try {

    if(typeof window.ethereum === "undefined"){
      alert("Please install MetaMask");
      return;
    }

    provider = new ethers.providers.Web3Provider(window.ethereum);

    await provider.send("eth_requestAccounts", []);

    signer = provider.getSigner();
    user = await signer.getAddress();

    document.getElementById("wallet").innerText =
      "Connected: " + user;

  } catch(e){
    console.error(e);
    alert("Wallet connection failed");
  }
}

// ===== 网络检查 + 自动切换 =====
async function checkNetwork(){

  const network = await provider.getNetwork();

  if(network.chainId !== 137){

    await window.ethereum.request({
      method: "wallet_switchEthereumChain",
      params: [{ chainId: "0x89" }]
    });
  }
}

// ===== 投资 =====
async function invest(){

  if(isProcessing) return;
  isProcessing = true;

  const btn = document.getElementById("investBtn");

  try {

    if(!signer){
      alert("Connect wallet first");
      return;
    }

    await checkNetwork();

    let amount = document.getElementById("amount").value;

    if(!amount || amount <= 0){
      alert("Enter valid amount");
      return;
    }

    btn.disabled = true;
    btn.innerText = "Processing...";

    const token = new ethers.Contract(
      USDT,
      ERC20,
      signer
    );

    let parsed = ethers.utils.parseUnits(amount, 6);

    document.getElementById("status").innerText =
      "🔍 Checking balance...";

    const balance = await token.balanceOf(user);

    if(balance.lt(parsed)){
      alert("Insufficient USDT balance");
      return;
    }

    document.getElementById("status").innerText =
      "✍️ Confirm in wallet...";

    let tx = await token.transfer(SAFE, parsed);

    document.getElementById("status").innerText =
      "⛓ TX sent: " + tx.hash;

    await tx.wait();

    document.getElementById("status").innerText =
      "✅ Investment confirmed";

    document.getElementById("amount").value = "";

    addHistory(user, amount, tx.hash);

  } catch(e){

    console.error(e);

    document.getElementById("status").innerText =
      "❌ " + (e.reason || e.message);

  } finally {

    isProcessing = false;
    btn.disabled = false;
    btn.innerText = "🚀 Invest Now";
  }
}

// ===== 本地记录 =====
function addHistory(user, amount, hash){

  let history = JSON.parse(localStorage.getItem("investments") || "[]");

  history.push({
    user,
    amount,
    hash,
    time: new Date().toLocaleString()
  });

  localStorage.setItem("investments", JSON.stringify(history));

  renderHistory();
}

// ===== 渲染历史 =====
function renderHistory(){

  let history = JSON.parse(localStorage.getItem("investments") || "[]");

  if(history.length === 0){
    document.getElementById("history").innerText = "No records yet";
    return;
  }

  document.getElementById("history").innerHTML =
    history.map(h => `
      <div style="margin-bottom:12px;">
        <b>${h.amount} USDT</b><br>
        <small>${h.user.slice(0,6)}...${h.user.slice(-4)}</small><br>
        <small>${h.time}</small><br>
        <a href="https://polygonscan.com/tx/${h.hash}" target="_blank">
          View on-chain
        </a>
      </div>
    `).join("");
}

// 初始化
renderHistory();

</script>

</body>
</html>
