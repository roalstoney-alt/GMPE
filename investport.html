<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Investor Portal</title>

<!-- ✅ 稳定 ethers -->
<script src="https://cdn.jsdelivr.net/npm/ethers@6.10.0/dist/ethers.umd.min.js"></script>

<style>
body {margin:0;background:#0b0f14;color:white;font-family:Arial;}
.container {max-width:700px;margin:auto;padding:20px;}
.card {background:#141a22;padding:20px;border-radius:12px;margin-top:20px;}
button {width:100%;padding:12px;margin-top:10px;border:none;border-radius:10px;background:#00ffae;font-weight:bold;}
input {width:100%;padding:10px;margin-top:10px;border:none;border-radius:8px;}
.status {margin-top:10px;color:#aaa;font-size:14px;}
.rank {font-size:13px;margin-top:10px;}
</style>
</head>

<body>

<div class="container">

<h2>🌍 Investor Portal</h2>

<div class="card">
<button onclick="connect()">🔗 Connect Wallet</button>
<div id="wallet">Not connected</div>
</div>

<div class="card">
<h3>💰 Invest (USDT - Polygon)</h3>

<input id="amount" placeholder="Enter amount (e.g. 10)">
<button onclick="invest()">🚀 Invest Now</button>

<div class="status" id="status"></div>
</div>

<div class="card">
<h3>📊 ROI Overview</h3>
<div id="roi">No data</div>
</div>

<div class="card">
<h3>🏆 Top Investors</h3>
<div id="rank">No data</div>
</div>

</div>

<script>

// ===== CONFIG =====
const SAFE = "0xC8DF3B516616800b2709F66e1bee7520aBAbD4E2";
const USDT = "0xC2132D05D31c914a87C6611C10748AaCBdA6C62";

let provider, signer, user;

// ===== AUTO CONNECT（关键升级）=====
window.onload = async () => {

  if(window.ethereum){
    try{
      provider = new ethers.BrowserProvider(window.ethereum);

      let accounts = await provider.send("eth_accounts", []);

      if(accounts.length > 0){
        signer = await provider.getSigner();
        user = await signer.getAddress();
        updateWallet();
      }
    }catch{}
  }

  renderRank();
  renderROI();
}

// ===== CONNECT =====
async function connect(){

  if(!window.ethereum){
    alert("Install MetaMask");
    return;
  }

  provider = new ethers.BrowserProvider(window.ethereum);

  await provider.send("eth_requestAccounts", []);

  signer = await provider.getSigner();
  user = await signer.getAddress();

  updateWallet();
}

// ===== UI =====
function updateWallet(){
  document.getElementById("wallet").innerHTML =
    `Wallet: ${user.slice(0,6)}...${user.slice(-4)}`;
}

// ===== NETWORK CHECK =====
async function checkNetwork(){
  const network = await provider.getNetwork();

  if(network.chainId !== 137n){
    alert("Switch to Polygon");
    throw new Error("Wrong network");
  }
}

// ===== INVEST =====
async function invest(){

  try{

    if(!signer){
      alert("Connect wallet first");
      return;
    }

    await checkNetwork();

    let amount = document.getElementById("amount").value;

    if(!amount || amount <= 0){
      alert("Enter valid amount");
      return;
    }

    document.getElementById("status").innerText = "Preparing...";

    const token = new ethers.Contract(
      USDT,
      ["function transfer(address,uint256) returns(bool)"],
      signer
    );

    let parsed = ethers.parseUnits(amount,6);

    let tx = await token.transfer(SAFE, parsed);

    document.getElementById("status").innerText =
      "TX sent: " + tx.hash;

    await tx.wait();

    document.getElementById("status").innerText =
      "✅ Investment confirmed";

    saveInvestment(amount, tx.hash);

    // 🔥 自动返回 dashboard
    setTimeout(()=>{
      window.location.href = "index.html";
    },1500);

  }catch(e){
    document.getElementById("status").innerText = e.message;
  }
}

// ===== STORAGE =====
function saveInvestment(amount, hash){

  let data = JSON.parse(localStorage.getItem("invest") || "[]");

  data.push({
    user,
    amount: Number(amount),
    hash,
    time: Date.now()
  });

  localStorage.setItem("invest", JSON.stringify(data));

  renderRank();
  renderROI();
}

// ===== RANK =====
function renderRank(){

  let data = JSON.parse(localStorage.getItem("invest") || "[]");

  let map = {};

  data.forEach(d=>{
    map[d.user] = (map[d.user] || 0) + d.amount;
  });

  let sorted = Object.entries(map).sort((a,b)=>b[1]-a[1]);

  document.getElementById("rank").innerHTML =
    sorted.map((i,index)=>`
      ${index+1}. ${i[0].slice(0,6)}... : $${i[1]}
    `).join("<br>") || "No data";
}

// ===== ROI =====
function renderROI(){

  let data = JSON.parse(localStorage.getItem("invest") || "[]");

  let total = data.reduce((a,b)=>a+b.amount,0);

  let roi = total * 0.15; // 模拟15%

  document.getElementById("roi").innerHTML =
    `Total Invested: $${total}<br>
     Estimated Return: $${roi.toFixed(2)}`;
}

</script>

</body>
</html>
