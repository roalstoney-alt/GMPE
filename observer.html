<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Observer Panel</title>

<button onclick="connectWallet()">🔗 Connect Wallet</button>

<script src="https://cdn.jsdelivr.net/npm/ethers@6.10.0/dist/ethers.umd.min.js"></script>

<style>
body {background:#0f172a;color:white;font-family:Arial;padding:20px;}
button {background:#00ffae;padding:10px;border:none;border-radius:8px;margin-top:10px;}
input {width:100%;padding:10px;margin-top:10px;border-radius:8px;border:none;}
.card {border:1px solid #334155;padding:15px;margin-top:15px;border-radius:10px;}
</style>
</head>
<body>

<h2>🧾 Observer Task Approval</h2>

<div id="wallet">❌ Not connected</div>

<hr>

<h3>Load Task Proof</h3>
<input id="cidInput" placeholder="Paste proof.json URL">
<button onclick="loadProof()">Load Task</button>

<div id="result"></div>

<script>

let provider;
let signer = null;
let user = null;
let proofData = null;

/* ======================
   INIT
====================== */
function init(){

  if(typeof window.ethereum === "undefined"){
    document.getElementById("wallet").innerHTML =
      "❌ No wallet detected (install MetaMask)";
    return;
  }

  provider = new ethers.BrowserProvider(window.ethereum);

  document.getElementById("wallet").innerHTML =
    "🟡 Wallet not connected";
}

/* ======================
   CONNECT WALLET (FIXED)
====================== */
async function connectWallet(){

  try{

    if(!provider){
      alert("No wallet found");
      return;
    }

    await provider.send("eth_requestAccounts", []);

    signer = await provider.getSigner();
    user = await signer.getAddress();

    document.getElementById("wallet").innerHTML =
      "✅ Connected: " + user;

  }catch(err){
    console.error(err);
    alert("Wallet connection failed");
  }
}

/* ======================
   LOAD PROOF
====================== */
async function loadProof(){

  const url = document.getElementById("cidInput").value;

  if(!url){
    alert("Paste proof URL");
    return;
  }

  try{

    const res = await fetch(url);
    const data = await res.json();

    proofData = data;

    const message = JSON.stringify({
      taskId: data.taskId,
      worker: data.worker,
      proofFile: data.proofFile,
      timestamp: data.timestamp
    });

    const recovered = ethers.verifyMessage(message, data.signature);

    const valid = recovered.toLowerCase() === data.worker.toLowerCase();

    document.getElementById("result").innerHTML = `
      <div class="card">
        Task: ${data.taskId}<br>
        Worker: ${data.worker}<br>

        ${valid ? "✅ Worker verified" : "❌ Invalid proof"}

        <br><br>
        <button onclick="connectWallet()">🔗 Connect Wallet</button>
        <button onclick="approve()">✅ Approve</button>
      </div>
    `;

  }catch(e){
    console.error(e);
    alert("Failed to load proof");
  }
}

/* ======================
   APPROVE
====================== */
async function approve(){

  if(!signer){
    alert("Connect wallet first");
    return;
  }

  const review = {
    ...proofData,
    observer: user,
    approved: true
  };

  const message = JSON.stringify(review);

  const sig = await signer.signMessage(message);

  review.observerSig = sig;

  console.log("SIGNED:", review);

  alert("✅ Signed (upload to IPFS next step)");
}

init();
</script>

</body>
</html>
