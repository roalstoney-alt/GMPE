<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Observer Panel</title>

<script src="https://cdn.jsdelivr.net/npm/ethers@6.10.0/dist/ethers.umd.min.js"></script>

<style>
body {background:#0f172a;color:white;font-family:Arial;padding:20px;}
button {background:#00ffae;padding:10px;border:none;border-radius:8px;margin-top:10px;}
input {width:100%;padding:10px;margin-top:10px;border-radius:8px;border:none;}
.card {border:1px solid #334155;padding:15px;margin-top:15px;border-radius:10px;}
</style>
</head>
<body>

<h2>🧾 Observer Task Approval</h2>

<div id="wallet">❌ Not connected</div>

<hr>

<h3>Load Task Proof</h3>
<input id="cidInput" placeholder="Paste proof.json URL">
<button onclick="loadProof()">Load Task</button>

<div id="result"></div>

<script>

// ===== CONFIG =====
const PINATA_GATEWAY = "https://white-urban-sheep-350.mypinata.cloud/ipfs/";

let provider = new ethers.BrowserProvider(window.ethereum);
let signer = null;
let user = null;
let proofData = null;

/* ======================
   CONNECT WALLET
====================== */
async function connectWallet(){
  await provider.send("eth_requestAccounts", []);
  signer = await provider.getSigner();
  user = await signer.getAddress();

  document.getElementById("wallet").innerHTML =
    "✅ Observer: " + user;
}

/* ======================
   LOAD PROOF (ANYONE CAN)
====================== */
async function loadProof(){

  const url = document.getElementById("cidInput").value;

  if(!url) return alert("Paste CID");

  const res = await fetch(url);
  const data = await res.json();

  proofData = data;

  // verify worker signature
  const message = JSON.stringify({
    taskId: data.taskId,
    worker: data.worker,
    proofFile: data.proofFile,
    timestamp: data.timestamp
  });

  const recovered = ethers.verifyMessage(message, data.signature);

  const valid = recovered.toLowerCase() === data.worker.toLowerCase();

  document.getElementById("result").innerHTML = `
    <div class="card">
      <b>Task:</b> ${data.taskId}<br>
      <b>Worker:</b> ${data.worker}<br>

      ${valid ? "✅ Worker verified" : "❌ Invalid proof"}

      <h4>Proof:</h4>
      ${renderProof(data.proofFile)}

      ${valid ? `
        <button onclick="connectWallet()">Connect Wallet</button>
        <button onclick="approve()">Approve (Sign)</button>
      ` : ""}
    </div>
  `;
}

/* ======================
   APPROVE (SIGN ONLY)
====================== */
async function approve(){

  if(!signer){
    alert("Connect wallet first");
    return;
  }

  const review = {
    ...proofData,
    observer: user,
    approved: true
  };

  const message = JSON.stringify(review);

  const observerSig = await signer.signMessage(message);

  review.observerSig = observerSig;

  // upload review.json to IPFS
  const res = await fetch("https://api.pinata.cloud/pinning/pinJSONToIPFS",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      Authorization:`Bearer YOUR_PINATA_JWT`
    },
    body: JSON.stringify({
      pinataContent: review
    })
  });

  const data = await res.json();

  const url = PINATA_GATEWAY + data.IpfsHash;

  document.getElementById("result").innerHTML += `
    <br><br>✅ Approved<br>
    <b>Review Link:</b><br>
    <a href="${url}" target="_blank">${url}</a>
  `;
}

/* ======================
   RENDER MEDIA
====================== */
function renderProof(url){

  if(url.endsWith(".mp4")){
    return `<video controls width="100%">
              <source src="${url}">
            </video>`;
  }

  if(url.match(/\.(jpg|png|jpeg|gif)$/)){
    return `<img src="${url}" width="100%">`;
  }

  return `<a href="${url}" target="_blank">Open File</a>`;
}

</script>

</body>
</html>
