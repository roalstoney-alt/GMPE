<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Worker Task Portal</title>
<script src="https://cdn.jsdelivr.net/npm/ethers@6.10.0/dist/ethers.umd.min.js"></script>

<style>
body {background:#0f172a;color:white;font-family:Arial;}
.card {border:1px solid #334155;padding:12px;margin:10px;border-radius:10px;}
button {margin-top:6px;padding:6px 10px;}
</style>
</head>

<body>

<h2>👷 Worker Task Portal</h2>
<div id="wallet"></div>
<div id="stakeStatus"></div>

<hr>

<h3>Available Tasks</h3>
<div id="tasks"></div>

<script>

const CONTRACT = "0x6881Ad624D23bDC3e21b3B6dafD49C3E7f61BB4C";

const ABI = [
  "function workerStake(address) view returns(uint256)"
];

let provider = new ethers.BrowserProvider(window.ethereum);
let signer, user;

/* ======================
   INIT
====================== */
async function init(){
  await provider.send("eth_requestAccounts", []);
  signer = await provider.getSigner();
  user = (await signer.getAddress()).toLowerCase(); // 🔥 normalize

  document.getElementById("wallet").innerText =
    "Wallet: " + user;

  await checkStake();
  render();
}

/* ======================
   STAKE CHECK
====================== */
async function checkStake(){
  const c = new ethers.Contract(CONTRACT, ABI, provider);
  const s = await c.workerStake(user);

  document.getElementById("stakeStatus").innerText =
    s > 0n ? "✅ Staked" : "❌ Not Staked";
}

/* ======================
   FIXED TASKS
====================== */
const TASKS = [
  { id: 1, name: "Task 1 - Photo", reward: "0.01" },
  { id: 2, name: "Task 2 - Video", reward: "0.02" },
  { id: 3, name: "Task 3 - Survey", reward: "0.03" }
];

/* ======================
   STORAGE
====================== */
function getAll(){
  return JSON.parse(localStorage.getItem("tasksDB") || "[]");
}

function saveAll(data){
  localStorage.setItem("tasksDB", JSON.stringify(data));
}

/* ======================
   SELECT TASK
====================== */
async function selectTask(id){

  const c = new ethers.Contract(CONTRACT, ABI, provider);
  const stake = await c.workerStake(user);

  if(stake == 0n){
    alert("Stake required");
    return;
  }

  let all = getAll();

  let existing = all.find(x =>
    x.worker.toLowerCase() === user
  );

  if(existing){
    alert("You already selected a task");
    return;
  }

  const msg = `SELECT:${id}:${user}:${Date.now()}`;
  const sig = await signer.signMessage(msg);

  all.push({
    taskId: id,
    worker: user, // already normalized
    status: "selected",
    signature: sig
  });

  saveAll(all);
  render();
}

/* ======================
   UPLOAD PROOF
====================== */
function uploadProof(id){

  let all = getAll();

  let t = all.find(x =>
    x.worker.toLowerCase() === user &&
    x.taskId === id
  );

  const file = document.getElementById("file-"+id).files[0];
  if(!file) return alert("Select file");

  t.proof = file.name;
  t.status = "submitted";

  saveAll(all);
  render();
}

/* ======================
   REQUEST PAYMENT
====================== */
async function requestPayment(id){

  let all = getAll();

  let t = all.find(x =>
    x.worker.toLowerCase() === user &&
    x.taskId === id
  );

  const msg = `PAY:${id}:${user}:${t.proof}:${Date.now()}`;
  const sig = await signer.signMessage(msg);

  t.paySig = sig;
  t.status = "pending_payment";

  saveAll(all);
  render();
}

/* ======================
   RENDER
====================== */
function render(){

  let all = getAll();

  let myTask = all.find(x =>
    x.worker.toLowerCase() === user
  );

  let html = "";

  TASKS.forEach(t => {

    html += `<div class="card">
      <b>${t.name}</b><br>
      Reward: ${t.reward} ETH<br>`;

    // NOT SELECTED
    if(!myTask){
      html += `<button onclick="selectTask(${t.id})">Select</button>`;
    }

    // MY TASK
    if(myTask && myTask.taskId === t.id){

      html += `<br>✅ Your Task<br>Status: ${myTask.status}<br>`;

      if(myTask.status === "selected"){
        html += `
          <input type="file" id="file-${t.id}">
          <button onclick="uploadProof(${t.id})">Upload Proof</button>
        `;
      }

      if(myTask.status === "submitted"){
        html += `
          <button onclick="requestPayment(${t.id})">Request Payment</button>
        `;
      }

      if(myTask.status === "pending_payment"){
        html += `<br>💰 Waiting payment`;
      }
    }

    html += `</div>`;
  });

  document.getElementById("tasks").innerHTML = html;
}

init();

</script>

</body>
</html>
