<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Worker Task System</title>
<script src="https://cdn.jsdelivr.net/npm/ethers@6.10.0/dist/ethers.umd.min.js"></script>

<style>
body {background:#0f172a;color:white;font-family:Arial;}
.card {border:1px solid #334155;padding:12px;margin:10px;border-radius:10px;}
button {margin-top:6px;padding:6px 10px;}
</style>
</head>

<body>

<h2>Worker Task Portal</h2>
<div id="wallet"></div>
<div id="stakeStatus"></div>

<hr>

<h3>Select Task</h3>
<div id="tasks"></div>

<script>

const CONTRACT = "0x6881Ad624D23bDC3e21b3B6dafD49C3E7f61BB4C";

const ABI = [
  "function workerStake(address) view returns(uint256)"
];

let provider = new ethers.BrowserProvider(window.ethereum);
let signer, user;

/* ======================
   INIT
====================== */
async function init(){

  await provider.send("eth_requestAccounts", []);
  signer = await provider.getSigner();
  user = await signer.getAddress();

  document.getElementById("wallet").innerText =
    "Wallet: " + user;

  await checkStake();
  render();
}

/* ======================
   STAKE CHECK
====================== */
async function checkStake(){
  const c = new ethers.Contract(CONTRACT, ABI, provider);
  const s = await c.workerStake(user);

  document.getElementById("stakeStatus").innerText =
    s > 0n ? "✅ Staked" : "❌ Not Staked";
}

/* ======================
   TASKS (FIXED)
====================== */
const TASKS = [
  { id: 1, name: "Task 1 - Photo", reward: "0.01" },
  { id: 2, name: "Task 2 - Video", reward: "0.02" },
  { id: 3, name: "Task 3 - Survey", reward: "0.03" }
];

/* ======================
   STORAGE
====================== */
function getState(){
  return JSON.parse(localStorage.getItem("workerTask") || "{}");
}

function saveState(s){
  localStorage.setItem("workerTask", JSON.stringify(s));
}

/* ======================
   SELECT TASK
====================== */
async function selectTask(id){

  const c = new ethers.Contract(CONTRACT, ABI, provider);
  const stake = await c.workerStake(user);

  if(stake == 0n){
    alert("Stake required");
    return;
  }

  const msg = `SELECT:${id}:${user}:${Date.now()}`;
  const sig = await signer.signMessage(msg);

  const state = {
    taskId: id,
    worker: user,
    signature: sig,
    status: "selected"
  };

  saveState(state);
  render();
}

/* ======================
   UPLOAD PROOF
====================== */
function uploadProof(){

  let s = getState();

  const file = document.getElementById("proof").files[0];
  if(!file) return alert("Select file");

  s.proof = file.name;
  s.status = "submitted";

  saveState(s);
  render();
}

/* ======================
   REQUEST PAYMENT
====================== */
async function requestPayment(){

  let s = getState();

  const msg = `PAY:${s.taskId}:${user}:${s.proof}:${Date.now()}`;
  const sig = await signer.signMessage(msg);

  s.paySig = sig;
  s.status = "pending_payment";

  saveState(s);
  render();
}

/* ======================
   RENDER
====================== */
function render(){

  let s = getState();
  let html = "";

  TASKS.forEach(t => {

    html += `<div class="card">
      <b>${t.name}</b><br>
      Reward: ${t.reward} ETH<br>`;

    // no task selected
    if(!s.taskId){
      html += `<button onclick="selectTask(${t.id})">Select</button>`;
    }

    // selected task
    if(s.taskId === t.id && s.worker === user){

      html += `<br>✅ Selected<br>Status: ${s.status}<br>`;

      if(s.status === "selected"){
        html += `
          <input type="file" id="proof">
          <button onclick="uploadProof()">Upload Proof</button>
        `;
      }

      if(s.status === "submitted"){
        html += `
          <button onclick="requestPayment()">Request Payment</button>
        `;
      }

      if(s.status === "pending_payment"){
        html += `<br>💰 Waiting payment`;
      }
    }

    html += `</div>`;
  });

  document.getElementById("tasks").innerHTML = html;
}

init();

</script>

</body>
</html>
