<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Create Task</title>

<script src="https://cdn.jsdelivr.net/npm/ethers@6.10.0/dist/ethers.umd.min.js"></script>

<style>
body {background:#0b0f14;color:white;font-family:Arial;}
.container {max-width:700px;margin:auto;padding:20px;}
.card {background:#141a22;padding:20px;margin-top:20px;border-radius:12px;}
button {width:100%;padding:14px;margin-top:10px;background:#00ffae;border:none;border-radius:8px;}
input {width:100%;padding:10px;margin-top:10px;border:none;border-radius:8px;}
.status {margin-top:15px;font-weight:bold;}
</style>
</head>

<body>

<div class="container">

<h2>📦 Create Task</h2>

<div class="card">
<div id="wallet">Connecting wallet...</div>
</div>

<div class="card">
<h3>Create Task</h3>

<!-- worker is auto = connected wallet -->
<input id="worker" disabled>

<input id="reward" placeholder="Reward (e.g. 0.01)">

<button onclick="createTask()">Create Task</button>

<div id="status" class="status"></div>
</div>

<div class="card">
<h3>Tasks</h3>
<button onclick="loadTasks()">Refresh</button>
<div id="tasks"></div>
</div>

</div>

<script>

// ===== CONFIG =====
const CONTRACT = ethers.getAddress("0x6881Ad624D23bDC3e21b3B6dafD49C3E7f61BB4C"); // 🔥 your contract

const ABI = [
  "function createTask(address worker,uint256 reward)",
  "function workerStake(address) view returns(uint256)",
  "function tasks(uint256) view returns(address,uint256,uint256,bool)"
];

let provider, signer, user;

// ===== INIT =====
window.onload = async function(){

  try{
    if (!window.ethereum){
      alert("Please open in MetaMask");
      return;
    }

    provider = new ethers.BrowserProvider(window.ethereum);
    await provider.send("eth_requestAccounts", []);

    signer = await provider.getSigner();
    user = await signer.getAddress();

    document.getElementById("wallet").innerText =
      "Connected: " + user;

    document.getElementById("worker").value = user;

  }catch(e){
    document.getElementById("wallet").innerText =
      "❌ Wallet not connected";
  }

  loadTasks();
};

// ===== CREATE TASK =====
async function createTask(){

  try{

    if(!signer){
      alert("Connect wallet first");
      return;
    }

    const rewardInput = document.getElementById("reward").value;

    if(!rewardInput){
      alert("Enter reward");
      return;
    }

    const contract = new ethers.Contract(CONTRACT, ABI, signer);

    // 🔥 FORCE worker = current wallet
    const worker = user;

    // 🔥 CHECK STAKE (must be > 0)
    let stake = await contract.workerStake(worker);

    if(stake === 0n){
      document.getElementById("status").innerText =
        "❌ You must stake first";
      return;
    }

    // 🔥 reward in POL
    let reward = ethers.parseEther(rewardInput);

    document.getElementById("status").innerText =
      "Creating task...";

    // 🔥 critical: worker = msg.sender
    let tx = await contract.createTask(worker, reward);

    await tx.wait();

    document.getElementById("status").innerText =
      "✅ Task created";

    loadTasks();

  }catch(e){
    console.error(e);

    document.getElementById("status").innerText =
      "❌ " + (e.reason || e.message);
  }
}

// ===== LOAD TASKS =====
async function loadTasks(){

  try{

    const contract = new ethers.Contract(CONTRACT, ABI, provider);

    let html = "";
    let found = false;

    for(let i=0;i<20;i++){

      try{

        let t = await contract.tasks(i);

        found = true;

        html += `
        <div style="margin-bottom:15px;">
        Task #${i}<br>
        Worker: ${t[0]}<br>
        Reward: ${Number(ethers.formatEther(t[1]))} POL<br>
        Approvals: ${t[2]}<br>
        Executable: ${t[3] ? "✅ YES" : "❌ NO"}<br>
        </div>`;

      }catch{
        break;
      }
    }

    if(!found){
      html = "⚠️ No tasks yet";
    }

    document.getElementById("tasks").innerHTML = html;

  }catch(e){
    document.getElementById("tasks").innerText =
      "❌ " + e.message;
  }
}

</script>

</body>
</html>
