<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Create Task DEBUG</title>

<script src="https://cdn.jsdelivr.net/npm/ethers@6.10.0/dist/ethers.umd.min.js"></script>

<style>
body {background:#0b0f14;color:white;font-family:Arial;}
.container {max-width:700px;margin:auto;padding:20px;}
.card {background:#141a22;padding:20px;margin-top:20px;border-radius:12px;}
button {width:100%;padding:14px;margin-top:10px;background:#00ffae;border:none;}
input {width:100%;padding:10px;margin-top:10px;}
.log {background:#000;padding:10px;margin-top:15px;height:250px;overflow:auto;font-size:12px;}
.ok {color:#00ffae;}
.err {color:#ff4d4f;}
.warn {color:#ffaa00;}
</style>
</head>

<body>

<div class="container">

<h2>🧪 Create Task DEBUG</h2>

<div class="card">
<div id="wallet"></div>
</div>

<div class="card">
<input id="reward" placeholder="Reward (e.g. 0.01)">
<button onclick="runDebug()">Run Debug CreateTask</button>
</div>

<div id="log" class="log"></div>

</div>

<script>

const CONTRACT = "0x6881Ad624D23bDC3e21b3B6dafD49C3E7f61BB4C";

const ABI = [
  "function createTask(address,uint256)",
  "function workerStake(address) view returns(uint256)"
];

let provider, signer, user;

function log(msg, type=""){
  const el = document.getElementById("log");
  el.innerHTML += `<div class="${type}">▶ ${msg}</div>`;
  el.scrollTop = el.scrollHeight;
  console.log(msg);
}

// ===== INIT =====
window.onload = async function(){

  try{
    provider = new ethers.BrowserProvider(window.ethereum);
    await provider.send("eth_requestAccounts", []);
    signer = await provider.getSigner();
    user = await signer.getAddress();

    document.getElementById("wallet").innerText =
      "Wallet: " + user;

  }catch(e){
    log(e.message, "err");
  }
};

// ===== DEBUG RUN =====
async function runDebug(){

  document.getElementById("log").innerHTML = "";

  try{

    if(!signer) throw new Error("Wallet not connected");

    log("=== START DEBUG ===");

    const contract = new ethers.Contract(CONTRACT, ABI, signer);

    log("Contract: " + CONTRACT);

    // 🔍 CHECK CODE EXISTS
    const code = await provider.getCode(CONTRACT);
    log("Contract code length: " + code.length);

    if(code === "0x"){
      log("❌ CONTRACT NOT FOUND", "err");
      return;
    } else {
      log("✅ Contract exists", "ok");
    }

    // 🔍 CHECK STAKE
    const stake = await contract.workerStake(user);
    log("Stake value: " + stake);

    if(stake === 0n){
      log("❌ NOT STAKED", "err");
      return;
    } else {
      log("✅ Stake OK", "ok");
    }

    // 🔍 REWARD
    const rewardInput = document.getElementById("reward").value;

    if(!rewardInput){
      throw new Error("Enter reward");
    }

    const reward = ethers.parseEther(rewardInput);
    log("Reward parsed: " + reward);

    // 🔍 STATIC CALL FIRST (IMPORTANT)
    try{
      await contract.createTask.staticCall(user, reward);
      log("✅ Static call passed (no revert)", "ok");
    }catch(e){
      log("❌ STATIC CALL FAILED", "err");
      log(e.reason || e.message, "err");
      return;
    }

    // 🔥 REAL TX
    log("Sending transaction...");

    const tx = await contract.createTask(user, reward);

    log("TX hash: " + tx.hash);

    await tx.wait();

    log("🎉 SUCCESS — TASK CREATED", "ok");

  }catch(e){

    log("❌ ERROR OCCURRED", "err");

    if(e.reason){
      log("Reason: " + e.reason, "err");
    }

    if(e.data){
      log("Data: " + e.data, "warn");
    }

    log(e.message, "err");
    console.error(e);
  }
}

</script>

</body>
</html>
