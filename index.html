<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Global Mobile-Power Network</title>

<style>
body {margin:0;background:#0b0f14;color:white;font-family:Arial;}

.title {text-align:center;padding:10px;font-size:22px;font-weight:bold;}
.subtitle {text-align:center;font-size:14px;color:#aaa;margin-top:-5px;}

.cta {text-align:center;margin-bottom:10px;}
.cta button{
  background:#00ffae;border:none;padding:10px 20px;
  border-radius:20px;font-weight:bold;cursor:pointer;
}

.map {
  position:relative;
  height:70vh;
  background:url('https://upload.wikimedia.org/wikipedia/commons/8/80/World_map_-_low_resolution.svg');
  background-size:cover;
}

.city {
  position:absolute;
  transform:translate(-50%,-50%);
  text-align:center;
}

.house {font-size:34px;cursor:pointer;}

.worker {
  font-size:16px;
  margin:2px;
  cursor:pointer;
  transition:transform 0.2s;
}
.worker:hover {transform:scale(1.2);}

.observer {
  font-size:14px;
  margin:2px;
  display:inline-block;
  animation:pulse 1.8s infinite;
}

@keyframes pulse {
  0% {opacity:0.4;}
  50% {opacity:1;}
  100% {opacity:0.4;}
}

.progress {
  width:70px;height:6px;background:#222;margin:auto;border-radius:4px;
}
.progress-fill {height:100%;background:#00ffae;}

.panel {
  position:absolute;
  left:10px;
  top:10px;
  width:240px;
  height:380px;
  background:#141a22;
  padding:10px;
  border-radius:10px;
  overflow:auto;
}

.feed {
  position:fixed;
  right:10px;
  top:10px;
  width:260px;
  height:260px;
  overflow:auto;
  background:#141a22;
  padding:10px;
  border-radius:10px;
  font-size:12px;
}

.detail {
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#141a22;
  padding:12px;
  border-radius:10px;
  display:none;
  min-width:220px;
}
</style>
</head>

<body>

<div class="title">
🌍 Global Mobile-Power Network
</div>

<div class="subtitle">
Earn by Working, Verifying, and Funding Real-World Tasks
</div>

<div style="text-align:center;margin:10px;font-size:16px;color:#00ffae;">
💸 Someone just earned $<span id="lastEarn">0</span>
</div>

<div class="cta">
<button onclick="window.location.href='join.html'">🚀 Join Us</button>
</div>

<div style="text-align:center;margin-top:5px;">
<button onclick="window.location.href='worker.html'">👷 Start Earning Now</button>
<button onclick="window.location.href='observer.html'">🧾 Become Observer</button>
<button onclick="window.location.href='investor.html'">💰 Invest</button>
</div>

<div class="map">

<div class="panel">
<h4>🏆 Investors</h4>
<div id="investorRank"></div>

<h4>👷 Workers</h4>
<div id="workerRank"></div>

<h4>🧾 Observers</h4>
<div id="observerRank"></div>
</div>

<!-- Jakarta -->
<div class="city" style="left:75%;top:70%;">
  <div class="house" onclick="showInvestor('jakarta')">🏠☀️🔋</div>
  <div id="jakartaWorkers"></div>
  <div id="jakartaObservers"></div>
  <div id="jakartaBattery"></div>
  <div class="progress"><div id="jakartaProgress" class="progress-fill"></div></div>
  Jakarta
</div>

<!-- Mumbai -->
<div class="city" style="left:60%;top:50%;">
  <div class="house" onclick="showInvestor('mumbai')">🏠☀️🔋</div>
  <div id="mumbaiWorkers"></div>
  <div id="mumbaiObservers"></div>
  <div id="mumbaiBattery"></div>
  <div class="progress"><div id="mumbaiProgress" class="progress-fill"></div></div>
  Mumbai
</div>

<!-- Kampala -->
<div class="city" style="left:40%;top:65%;">
  <div class="house" onclick="showInvestor('kampala')">🏠☀️🔋</div>
  <div id="kampalaWorkers"></div>
  <div id="kampalaObservers"></div>
  <div id="kampalaBattery"></div>
  <div class="progress"><div id="kampalaProgress" class="progress-fill"></div></div>
  Kampala
</div>

</div>

<div class="feed" id="feed"></div>
<div id="detailBox" class="detail"></div>

<script>

let cities = {
  jakarta:{
    wallet:"0xA1...",
    invested:1000,
    returned:0,
    workers:[
      {name:"W1",progress:30},
      {name:"W2",progress:60}
    ],
    observers:[
      {name:"O1",score:0}
    ]
  },
  mumbai:{
    wallet:"0xB2...",
    invested:500,
    returned:0,
    workers:[
      {name:"W3",progress:20}
    ],
    observers:[
      {name:"O2",score:0}
    ]
  },
  kampala:{
    wallet:"0xC3...",
    invested:800,
    returned:0,
    workers:[
      {name:"W4",progress:80}
    ],
    observers:[
      {name:"O3",score:0}
    ]
  }
};

function showDetail(html){
  let box=document.getElementById("detailBox");
  box.innerHTML=html;
  box.style.display="block";
}

function showInvestor(name){
  let c=cities[name];
  let roi=(c.returned/c.invested*100).toFixed(1);

  showDetail(`
    🏠 <b>${name.toUpperCase()}</b><br><br>
    ROI: ${roi}%
  `);
}

function log(msg){
  let f=document.getElementById("feed");
  let d=document.createElement("div");

  let emojis=["⚡","💸","🔋","🌍"];
  let e=emojis[Math.floor(Math.random()*emojis.length)];

  d.innerText=new Date().toLocaleTimeString()+" "+e+" "+msg;
  f.prepend(d);
}

function render(){

  let inv=[];
  let workers=[];
  let observers=[];

  Object.keys(cities).forEach(name=>{
    let c=cities[name];

    document.getElementById(name+"Workers").innerHTML =
      c.workers.map(()=>`<span class="worker">👷</span>`).join("");

    document.getElementById(name+"Observers").innerHTML =
      c.observers.map(()=>`<span class="observer">👁️</span>`).join("");

    document.getElementById(name+"Battery").innerHTML =
      "🔋".repeat(Math.floor(c.returned/20));

    let avg=c.workers.reduce((a,b)=>a+b.progress,0)/c.workers.length;
    document.getElementById(name+"Progress").style.width=avg+"%";

    inv.push({name,roi:c.returned/c.invested});
    c.workers.forEach(w=>workers.push(w));
    c.observers.forEach(o=>observers.push(o));
  });

  inv.sort((a,b)=>b.roi-a.roi);
  workers.sort((a,b)=>b.progress-a.progress);
  observers.sort((a,b)=>b.score-a.score);

  document.getElementById("investorRank").innerHTML =
    inv.map(i=>`${i.name} ${(i.roi*100).toFixed(1)}%`).join("<br>");

  document.getElementById("workerRank").innerHTML =
    workers.map((w,i)=>`W${i+1} ${w.progress.toFixed(0)}%`).join("<br>");

  document.getElementById("observerRank").innerHTML =
    observers.map((o,i)=>`${o.name} ${o.score}`).join("<br>");
}

setInterval(()=>{

  Object.keys(cities).forEach(name=>{
    let c=cities[name];

    c.workers.forEach(w=>{
      w.progress+=Math.random()*10;

      if(w.progress>100){
        w.progress=0;

        let reward=(10+Math.random()*40).toFixed(2);
        c.returned+=parseFloat(reward);

        document.getElementById("lastEarn").innerText=reward;

        // observer earns score
        c.observers.forEach(o=>o.score+=1);

        log("Worker completed task in "+name);
        log("Observer verified task in "+name);
        log("Energy generated +$"+reward);
      }
    });

  });

  render();

},2000);

render();

</script>

</body>
</html>
