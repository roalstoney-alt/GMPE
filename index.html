<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Global Power Network</title>

<style>
body {margin:0;background:#0b0f14;color:white;font-family:Arial;}

.title {text-align:center;padding:10px;font-size:22px;font-weight:bold;}

.subtitle {
  text-align:center;
  font-size:14px;
  color:#aaa;
  margin-top:-5px;
}

.cta {text-align:center;margin-bottom:10px;}

.cta button{
  background:#00ffae;border:none;padding:10px 20px;
  border-radius:20px;font-weight:bold;cursor:pointer;
}

.map {
  position:relative;
  height:70vh;
  background:url('https://upload.wikimedia.org/wikipedia/commons/8/80/World_map_-_low_resolution.svg');
  background-size:cover;
}

.city {
  position:absolute;
  transform:translate(-50%,-50%);
  text-align:center;
}

.house {font-size:34px;cursor:pointer;}
.worker {font-size:16px;cursor:pointer;margin:2px;}
.battery {font-size:16px;}

.progress {
  width:70px;height:6px;background:#222;margin:auto;border-radius:4px;
}
.progress-fill {height:100%;background:#00ffae;}

.panel {
  position:absolute;
  left:10px;
  top:10px;
  width:240px;
  height:260px;
  background:#141a22;
  padding:10px;
  border-radius:10px;
  overflow:auto;
}

.feed {
  position:fixed;
  right:10px;
  top:10px;
  width:260px;
  height:260px;
  overflow:auto;
  background:#141a22;
  padding:10px;
  border-radius:10px;
  font-size:12px;
}

.detail {
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#141a22;
  padding:12px;
  border-radius:10px;
  display:none;
  min-width:220px;
}
</style>
</head>

<body>

<div class="title">
🌍 Global Mobile-Power Network
</div>

<div class="subtitle">
Earn by completing real-world tasks. Build your on-chain reputation.
</div>

<div style="text-align:center;margin:10px;font-size:16px;color:#00ffae;">
💸 Someone just earned $<span id="lastEarn">0</span>
</div>

<div class="cta">
<button onclick="window.location.href='join.html'">🚀 Join Us</button>
</div>

<div style="text-align:center;margin-top:5px;">
<button onclick="alert('Connect wallet to start earning')">
👷 Start Earning Now
</button>
</div>

<div class="map">

<div class="panel">
<h4>🏆 Investors</h4>
<div id="investorRank"></div>

<h4>👷 Workers</h4>
<div id="workerRank"></div>
</div>

<!-- Jakarta -->
<div class="city" style="left:70%;top:65%;">
  <div class="house" onclick="showInvestor('jakarta')">🏠☀️🔋</div>
  <div id="jakartaWorkers"></div>
  <div id="jakartaBattery"></div>
  <div class="progress"><div id="jakartaProgress" class="progress-fill"></div></div>
  Jakarta
</div>

<!-- Mumbai -->
<div class="city" style="left:60%;top:45%;">
  <div class="house" onclick="showInvestor('mumbai')">🏠☀️🔋</div>
  <div id="mumbaiWorkers"></div>
  <div id="mumbaiBattery"></div>
  <div class="progress"><div id="mumbaiProgress" class="progress-fill"></div></div>
  Mumbai
</div>

<!-- Kampala -->
<div class="city" style="left:50%;top:60%;">
  <div class="house" onclick="showInvestor('kampala')">🏠☀️🔋</div>
  <div id="kampalaWorkers"></div>
  <div id="kampalaBattery"></div>
  <div class="progress"><div id="kampalaProgress" class="progress-fill"></div></div>
  Kampala
</div>

</div>

<div class="feed" id="feed"></div>
<div id="detailBox" class="detail"></div>

<script>

let cities = {
  jakarta:{
    wallet:"0xA1...",
    invested:1000,
    returned:0,
    workers:[
      {name:"W1",wallet:"0xW1...",progress:30},
      {name:"W2",wallet:"0xW2...",progress:60}
    ]
  },
  mumbai:{
    wallet:"0xB2...",
    invested:500,
    returned:0,
    workers:[
      {name:"W3",wallet:"0xW3...",progress:20}
    ]
  },
  kampala:{
    wallet:"0xC3...",
    invested:800,
    returned:0,
    workers:[
      {name:"W4",wallet:"0xW4...",progress:80}
    ]
  }
};

function showDetail(html){
  let box=document.getElementById("detailBox");
  box.innerHTML=html;
  box.style.display="block";
}

function showInvestor(name){
  let c=cities[name];
  let roi=(c.returned/c.invested*100).toFixed(1);

  showDetail(`
    🏠 <b>${name.toUpperCase()}</b><br><br>
    Wallet: ${c.wallet}<br>
    Invested: $${c.invested}<br>
    Returned: $${c.returned.toFixed(2)}<br>
    ROI: <span style="color:#00ffae">${roi}%</span><br><br>
    ⚡ Energy Output<br>
    🔋 ${Math.floor(c.returned/10)} Units
  `);
}

function showWorker(city,index){
  let w=cities[city].workers[index];

  showDetail(`
    👷 <b>${w.name}</b><br><br>
    Wallet: ${w.wallet}<br>
    Progress: ${w.progress.toFixed(0)}%<br><br>
    💸 Estimated earning:<br>
    $${(w.progress*0.5).toFixed(2)}
  `);
}

function log(msg){
  let f=document.getElementById("feed");
  let d=document.createElement("div");

  let emojis = ["⚡","💸","🔋","🌍"];
  let e = emojis[Math.floor(Math.random()*emojis.length)];

  d.innerText=new Date().toLocaleTimeString()+" "+e+" "+msg;

  f.prepend(d);
}

function render(){

  let inv=[];
  let workers=[];

  Object.keys(cities).forEach(name=>{
    let c=cities[name];

    document.getElementById(name+"Workers").innerHTML =
      c.workers.map((w,i)=>
        `<span class="worker" onclick="showWorker('${name}',${i})">👷</span>`
      ).join("");

    document.getElementById(name+"Battery").innerHTML =
      "🔋".repeat(Math.floor(c.returned/20));

    let avg=c.workers.reduce((a,b)=>a+b.progress,0)/c.workers.length;
    document.getElementById(name+"Progress").style.width=avg+"%";

    inv.push({name,roi:c.returned/c.invested});
    c.workers.forEach(w=>workers.push(w));
  });

  inv.sort((a,b)=>b.roi-a.roi);
  workers.sort((a,b)=>b.progress-a.progress);

  document.getElementById("investorRank").innerHTML =
    inv.map(i=>`${i.name} ${(i.roi*100).toFixed(1)}%`).join("<br>");

  document.getElementById("workerRank").innerHTML =
    workers.map(w=>`${w.name} ${w.progress.toFixed(0)}%`).join("<br>");
}

setInterval(()=>{

  Object.keys(cities).forEach(name=>{
    let c=cities[name];

    c.workers.forEach(w=>{
      w.progress+=Math.random()*10;

      if(w.progress>100){
        w.progress=0;

        let reward=(10+Math.random()*40).toFixed(2);
        c.returned+=parseFloat(reward);

        document.getElementById("lastEarn").innerText = reward;

        log("Worker completed task in "+name);
        log("Energy generated +$"+reward);
      }
    });

  });

  render();

},2000);

render();

</script>

</body>
</html>
